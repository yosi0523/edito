<!DOCTYPE html>
<html>
<head><title>아이콘 생성기</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;

    // 배경
    ctx.fillStyle = '#4A90D9';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.2);
    ctx.fill();

    // 캘린더 아이콘
    const m = s * 0.2;
    const w = s - m * 2;
    const h = s - m * 2;

    // 캘린더 몸체
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.roundRect(m, m + h * 0.15, w, h * 0.85, s * 0.04);
    ctx.fill();

    // 캘린더 상단
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath();
    ctx.roundRect(m, m + h * 0.08, w, h * 0.2, [s*0.04, s*0.04, 0, 0]);
    ctx.fill();

    // 고리
    ctx.strokeStyle = 'white';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    const hookY = m + h * 0.08;
    ctx.beginPath();
    ctx.moveTo(m + w * 0.3, hookY - h * 0.05);
    ctx.lineTo(m + w * 0.3, hookY + h * 0.08);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(m + w * 0.7, hookY - h * 0.05);
    ctx.lineTo(m + w * 0.7, hookY + h * 0.08);
    ctx.stroke();

    // 날짜 텍스트
    ctx.fillStyle = '#333';
    ctx.font = `bold ${s * 0.25}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('12', s / 2, m + h * 0.62);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// 다운로드 링크
document.getElementById('c192').toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'icon-192.png';
    a.click();
});
document.getElementById('c512').toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'icon-512.png';
    a.click();
});
</script>
</body>
</html>
