    {q:"제빵 시 물의 역할이 아닌 것은?", o:["글루텐 형성 매개","전분 호화","이스트 활성화","빵 색상 결정"], a:3, e:"빵 색상은 주로 마이야르 반응(당+아미노산)과 캐러멜화에 의해 결정됩니다."},
    {q:"마이야르 반응(Maillard reaction)에 관여하는 것은?", o:["전분+물","당+아미노산","유지+물","소금+단백질"], a:1, e:"마이야르 반응은 환원당과 아미노산이 반응하여 갈색과 향을 만드는 비효소적 갈변 반응입니다."},
    // 제빵 재료학 (21~40)
    {q:"박력분의 주요 용도는?", o:["식빵","바게트","케이크·쿠키","우동면"], a:2, e:"박력분은 단백질 7~9%로 글루텐 형성이 적어 부드러운 케이크·쿠키에 적합합니다."},
    {q:"이스트의 최적 발효 온도는?", o:["15~20°C","25~30°C","35~40°C","45~50°C"], a:2, e:"이스트의 최적 발효 온도는 35~40°C이며, 60°C 이상에서 사멸합니다."},
    {q:"탈지분유를 제빵에 사용하는 주요 이유가 아닌 것은?", o:["영양 강화","껍질 색 개선","보수력 향상","발효 촉진"], a:3, e:"분유는 영양, 색, 보수력을 개선하지만 발효와는 직접적 관련이 없습니다."},
    {q:"쇼트닝(shortening)의 특징은?", o:["수분 함유","맛과 향이 강함","100% 유지 성분","냉장 필수"], a:2, e:"쇼트닝은 100% 유지로 구성되어 있으며, 무미·무취가 특징입니다."},
    {q:"제빵 개량제(improver)의 기능이 아닌 것은?", o:["반죽 안정성 향상","볼륨 증가","노화 지연","발효균 사멸"], a:3, e:"제빵 개량제는 반죽을 안정시키고 볼륨을 키우며 노화를 지연시킵니다. 발효균 사멸과는 무관합니다."},
    {q:"전분의 호화(gelatinization) 온도 범위는?", o:["30~40°C","55~70°C","80~90°C","100°C 이상"], a:1, e:"밀가루 전분은 약 55~70°C에서 호화가 시작됩니다."},
    {q:"물엿을 빵에 넣는 주된 이유는?", o:["발효 촉진","보습과 노화 방지","글루텐 강화","색 탈색"], a:1, e:"물엿은 보습성이 뛰어나 빵의 촉촉함을 유지하고 노화를 지연시킵니다."},
    {q:"르방(levain)이란?", o:["밀가루 종류","천연 발효종","제빵 도구","프랑스산 버터"], a:1, e:"르방은 밀가루와 물로 야생 효모와 유산균을 배양한 천연 발효종입니다."},
    {q:"밀가루 회분(ash) 함량이 높을수록?", o:["밀가루가 희고 고급","외피 성분이 많고 거침","글루텐이 강함","단맛이 강함"], a:1, e:"회분은 밀의 외피(겨) 성분으로, 회분이 높을수록 색이 어둡고 거친 밀가루입니다."},
    {q:"비타민C(아스코르빈산)를 제빵에 사용하는 이유는?", o:["맛 개선","산화제로 글루텐 강화","방부제 역할","색 탈색"], a:1, e:"비타민C는 산화되면서 글루텐의 S-S 결합을 강화하여 반죽 구조를 개선합니다."},
    {q:"전란(whole egg)에서 수분 비율은 약?", o:["50%","65%","74%","85%"], a:2, e:"전란은 약 74%가 수분이며, 나머지는 단백질과 지방 등입니다."},
    {q:"제빵용 소금으로 가장 적합한 것은?", o:["꽃소금","정제염","죽염","맛소금"], a:1, e:"정제염은 순도가 높고 입자가 균일하여 제빵에 적합합니다."},
    {q:"인스턴트 드라이이스트의 보관 방법은?", o:["상온 개봉 보관","냉동 밀봉 보관","햇볕에 건조","물에 담가 보관"], a:1, e:"인스턴트 드라이이스트는 개봉 후 밀봉하여 냉동 보관해야 활성을 유지합니다."},
    {q:"버터 대비 마가린의 특징은?", o:["유지방 100%","풍미가 더 좋음","가격이 저렴","녹는점이 낮음"], a:2, e:"마가린은 식물성 유지로 만들어 버터보다 가격이 저렴하지만 풍미는 부족합니다."},
    {q:"무염버터를 제빵에 주로 사용하는 이유는?", o:["가격이 저렴","소금량 조절 용이","풍미가 강함","보관이 쉬움"], a:1, e:"무염버터를 사용하면 레시피에서 소금량을 정확히 조절할 수 있습니다."},
    {q:"반죽에 너무 많은 설탕을 넣으면?", o:["발효가 촉진됨","글루텐이 강해짐","발효가 억제됨","색이 연해짐"], a:2, e:"설탕이 과하면 삼투압이 높아져 이스트 세포에서 수분이 빠져나가 발효가 억제됩니다."},
    {q:"우유를 제빵에 사용할 때 반드시 해야 하는 것은?", o:["가열 살균","냉동","설탕 첨가","발효"], a:0, e:"우유의 효소(프로테아제)가 글루텐을 분해할 수 있어 가열(스캘딩) 후 사용해야 합니다."},
    {q:"몰트(malt)의 역할은?", o:["색을 하얗게 함","효소(아밀라아제) 공급","글루텐 약화","방부 효과"], a:1, e:"몰트는 아밀라아제를 공급하여 전분을 당으로 분해, 이스트의 먹이를 제공합니다."},
    {q:"T55는 프랑스 밀가루 분류에서 무엇을 의미하는가?", o:["단백질 55%","회분 0.55%","수분 55%","글루텐 55%"], a:1, e:"프랑스 밀가루 분류에서 T55는 회분 함량 약 0.55%를 의미합니다."},
    {q:"호밀가루의 특성은?", o:["글루텐이 매우 풍부","글루텐이 거의 없음","단백질이 없음","설탕이 많음"], a:1, e:"호밀에는 글루텐 형성 단백질이 거의 없어 밀가루와 혼합하여 사용합니다."},
    // 제빵 공정·기법 (41~60)
    {q:"오토리즈(autolyse)란?", o:["고속 믹싱","밀가루+물만 섞어 휴지","르방 배양","2차 발효"], a:1, e:"오토리즈는 밀가루와 물만 섞어 20~60분 휴지시켜 글루텐을 자연스럽게 발달시키는 기법입니다."},
    {q:"바게트의 쿠프(coupe, 칼집)를 넣는 이유는?", o:["장식 목적만","가스 배출 통로 및 균일한 팽창","소금 흡수","수분 증발 방지"], a:1, e:"쿠프는 오븐에서 가스가 균일하게 빠져나가도록 하여 예측 가능한 팽창을 유도합니다."},
    {q:"스팀(steam) 주입의 효과가 아닌 것은?", o:["크러스트 형성 지연","광택 부여","오븐 스프링 향상","반죽 냉각"], a:3, e:"스팀은 반죽 표면을 촉촉하게 유지하여 크러스트 형성을 지연시키고 오븐 스프링을 돕습니다."},
    {q:"프루프(proof, 2차 발효)의 적정 온도·습도는?", o:["25°C, 50%","32~38°C, 75~85%","45°C, 90%","20°C, 30%"], a:1, e:"2차 발효는 32~38°C, 습도 75~85%에서 진행하는 것이 적절합니다."},
    {q:"크루아상 반죽의 접기 횟수는 보통?", o:["1회","3회(3절 3회 = 27층)","6회","10회"], a:1, e:"크루아상은 3절 접기를 3회 반복하여 27층의 버터 층을 만듭니다."},
    {q:"데트랑프(détrempe)란?", o:["버터 블록","크루아상의 기본 반죽","발효종","굽기 기법"], a:1, e:"데트랑프는 크루아상·파이 등에서 버터를 감싸는 기본 반죽을 말합니다."},
    {q:"스크래치법(scratch method)이란?", o:["밀가루를 긁어 사용","모든 재료를 처음부터 만드는 방법","기계 믹싱","냉동 반죽 사용"], a:1, e:"스크래치법은 프리믹스나 냉동 반죽 없이 원재료부터 만드는 전통 제빵법입니다."},
    {q:"풀리쉬(poolish)의 특징은?", o:["물:밀가루 = 1:1 액종","고체 발효종","소금이 들어감","단시간 발효"], a:0, e:"풀리쉬는 밀가루와 물을 동량 사용하는 액체 상태의 사전 발효종입니다."},
    {q:"비가(biga)의 특징은?", o:["수분이 매우 많은 액종","수분이 적은 되직한 발효종","천연 발효종","화학 팽창제"], a:1, e:"비가는 이탈리아식 사전 발효종으로 수화율이 50~60%로 되직합니다."},
    {q:"탕종법(湯種法)의 원리는?", o:["밀가루를 구워서 사용","밀가루+뜨거운 물로 전분 호화","냉동 반죽법","이스트 대신 베이킹파우더 사용"], a:1, e:"탕종법은 밀가루와 뜨거운 물(65°C 이상)을 섞어 전분을 호화시켜 보습력을 높이는 기법입니다."},
    {q:"성형 시 반죽 이음새(seam)를 아래로 놓는 이유는?", o:["보기 좋게","발효 시 벌어짐 방지","맛 향상","빨리 구워지게"], a:1, e:"이음새를 아래로 놓으면 발효·굽기 과정에서 벌어지지 않고 형태를 유지합니다."},
    {q:"식빵 틀에 기름을 바르는 이유는?", o:["맛 향상","탈형(빵 꺼내기) 용이","발효 촉진","색 개선"], a:1, e:"틀에 기름이나 이형제를 바르면 구운 후 빵을 쉽게 꺼낼 수 있습니다."},
    {q:"크러스트(crust)와 크럼(crumb)의 차이는?", o:["같은 뜻","크러스트=껍질, 크럼=속살","크러스트=속살, 크럼=껍질","크럼=형태 종류"], a:1, e:"크러스트는 빵의 바깥 껍질, 크럼은 빵의 부드러운 내부 조직을 말합니다."},
    {q:"쿨링(냉각) 시 빵을 랙 위에 올리는 이유는?", o:["바닥에 수분이 차지 않게","빨리 마르게","장식하기 편하게","추가 발효를 위해"], a:0, e:"랙 위에 올리면 공기가 순환하여 바닥에 수분이 응축되지 않아 눅눅해지지 않습니다."},
    {q:"에그워시(egg wash)의 목적은?", o:["발효 촉진","빵 표면에 광택과 색 부여","소금 대체","냉각 촉진"], a:1, e:"에그워시는 달걀물을 표면에 발라 구울 때 갈색 윤기를 내줍니다."},
    {q:"라미네이션(lamination)이란?", o:["밀가루 제분 과정","반죽과 유지를 겹겹이 접어 층 만들기","발효 방법","포장 기법"], a:1, e:"라미네이션은 크루아상·데니쉬 등에서 반죽과 버터를 접어 여러 층을 만드는 기법입니다."},
    {q:"식빵을 구운 직후 틀을 탁 치는(쇼크를 주는) 이유는?", o:["소리를 내기 위해","내부 수증기 배출로 주저앉음 방지","맛 향상","글루텐 강화"], a:1, e:"굽기 직후 충격을 주면 내부의 뜨거운 수증기가 빠져나가 빵이 주저앉는 것을 방지합니다."},
    {q:"둥글리기(rounding)의 목적은?", o:["반죽 표면을 매끈하게 하여 가스 보유력 향상","반죽 냉각","설탕 분배","색 부여"], a:0, e:"둥글리기는 반죽 표면을 팽팽하게 만들어 가스를 잘 보유하게 합니다."},
    {q:"오버믹싱의 결과는?", o:["반죽이 매끈해짐","반죽이 끈적이고 찢어짐","글루텐이 강해짐","발효가 빨라짐"], a:1, e:"과도한 믹싱은 글루텐 망을 파괴하여 반죽이 끈적이고 탄력을 잃게 됩니다."},
    {q:"분할(scaling)에서 정확한 계량이 중요한 이유는?", o:["맛 차이","균일한 크기와 굽기 시간 확보","발효 속도 조절","색 균일"], a:1, e:"정확한 분할은 모든 빵의 크기와 무게를 일정하게 하여 균일하게 구울 수 있습니다."},
    // 제빵 이론·과학 (61~80)
    {q:"전분의 노화(retrogradation)가 가장 빠른 온도 범위는?", o:["-18°C 이하","0~5°C","20~25°C","60°C 이상"], a:1, e:"전분 노화는 0~5°C(냉장 온도)에서 가장 빠르게 진행됩니다."},
    {q:"글루텐 윈도우 테스트(windowpane test)란?", o:["오븐 온도 확인","반죽을 얇게 펴서 투명하면 글루텐 충분","발효 상태 확인","빵 색 확인"], a:1, e:"반죽을 얇게 펼쳤을 때 찢어지지 않고 빛이 비칠 만큼 투명하면 글루텐이 충분히 발달한 것입니다."},
    {q:"흡수율(absorption rate)이란?", o:["이스트가 설탕을 흡수하는 비율","밀가루 대비 물의 비율","버터 흡수량","소금 용해량"], a:1, e:"흡수율은 밀가루 무게 대비 사용하는 물의 비율(%)을 말합니다."},
    {q:"제빵에서 pH가 발효에 미치는 영향으로 옳은 것은?", o:["알칼리성이 좋다","약산성(pH 4~6)이 이스트 활동에 적합","중성이 최적","pH와 무관"], a:1, e:"이스트는 약산성(pH 4~6) 환경에서 가장 활발하게 활동합니다."},
    {q:"빵이 식으면서 수분이 빠져나가는 현상을 무엇이라 하는가?", o:["발효","노화","스테일링(staling)","캐러멜화"], a:2, e:"스테일링은 빵이 시간이 지나면서 수분을 잃고 질감이 변하는 현상입니다."},
    {q:"오븐 온도가 너무 높으면 빵에 나타나는 현상은?", o:["속까지 잘 익음","겉은 타고 속은 덜 익음","부드러워짐","발효가 잘 됨"], a:1, e:"온도가 너무 높으면 겉이 빨리 굳어 열이 내부로 전달되지 못해 속이 덜 익습니다."},
    {q:"베이커 퍼센트(baker's percentage)의 기준은?", o:["물","설탕","밀가루","전체 재료"], a:2, e:"베이커 퍼센트는 밀가루를 100%로 기준하여 다른 재료의 비율을 계산합니다."},
    {q:"식빵 반죽의 일반적인 수화율(hydration)은?", o:["40~50%","60~65%","80~90%","100%"], a:1, e:"식빵 반죽의 수화율은 보통 60~65%입니다."},
    {q:"치아바타의 수화율은 보통?", o:["50%","65%","75~85%","100%"], a:2, e:"치아바타는 높은 수화율(75~85%)이 특징으로 큰 기공과 쫄깃한 식감을 만듭니다."},
    {q:"발효 시 알코올이 생성되는 과정은?", o:["호기성 발효","혐기성 발효(알코올 발효)","산화 반응","가수분해"], a:1, e:"산소가 부족한 환경에서 이스트는 당을 분해하여 알코올과 CO₂를 생성합니다."},
    {q:"프랑스빵에 비타민C를 첨가하는 이유는?", o:["영양 보충","반죽의 산화 촉진으로 볼륨 향상","맛 개선","색 탈색"], a:1, e:"비타민C는 산화제로 작용하여 글루텐 결합을 강화하고 반죽의 가스 보유력을 높입니다."},
    {q:"빵의 비체적(specific volume)이란?", o:["무게÷부피","부피÷무게","높이÷지름","밀도"], a:1, e:"비체적 = 부피/무게로, 빵의 가벼움과 부풀어 오른 정도를 나타냅니다."},
    {q:"효소 아밀라아제의 역할은?", o:["단백질 분해","지방 분해","전분을 당으로 분해","수분 흡수"], a:2, e:"아밀라아제는 전분을 말토오스 등 당으로 분해하여 이스트의 영양원을 제공합니다."},
    {q:"글루텐 형성에 필요한 3가지 조건은?", o:["밀가루+물+혼합","밀가루+설탕+열","물+소금+이스트","버터+달걀+설탕"], a:0, e:"글루텐은 밀가루의 단백질이 물과 만나 혼합(물리적 힘)을 통해 형성됩니다."},
    {q:"데니쉬 페이스트리와 크루아상의 차이점은?", o:["같은 반죽","데니쉬는 달걀이 들어감","크루아상에 달걀이 더 많음","차이 없음"], a:1, e:"데니쉬 반죽에는 달걀이 들어가 크루아상보다 부드럽고 리치합니다."},
    {q:"빵 표면의 기포(블리스터)가 생기는 원인은?", o:["온도가 낮아서","성형 시 공기가 갇혀서","소금이 많아서","설탕이 적어서"], a:1, e:"성형 시 반죽 표면 아래 공기가 갇히면 굽기 시 팽창하여 기포가 생깁니다."},
    {q:"식빵의 적정 굽기 온도는?", o:["130~150°C","170~190°C","210~230°C","250°C 이상"], a:1, e:"식빵은 보통 170~190°C에서 30~35분 정도 구워 내부까지 골고루 익힙니다."},
    {q:"바게트의 적정 굽기 온도는?", o:["150°C","180°C","220~250°C","280°C"], a:2, e:"바게트는 높은 온도(220~250°C)에서 스팀과 함께 구워 바삭한 크러스트를 만듭니다."},
    {q:"반죽의 되기(consistency)에 영향을 주는 요소가 아닌 것은?", o:["수분량","밀가루 종류","반죽 온도","오븐 온도"], a:3, e:"오븐 온도는 굽기 단계의 조건이며, 반죽의 되기와는 무관합니다."},
    {q:"발효 시 유산균이 만드는 것은?", o:["알코올","유산(젖산)","이산화탄소만","글루텐"], a:1, e:"유산균은 유산(젖산)을 생성하여 빵에 풍미와 산미를 부여합니다."},
    // 르꼬르동블루 관련·프랑스 제빵 (81~100)
    {q:"르꼬르동블루(Le Cordon Bleu)의 뜻은?", o:["파란 리본","빨간 리본","하얀 모자","금색 별"], a:0, e:"Le Cordon Bleu는 프랑스어로 '파란 리본'이라는 뜻입니다."},
    {q:"바게트(baguette)의 프랑스어 뜻은?", o:["긴 빵","막대기","프랑스빵","밀가루빵"], a:1, e:"Baguette는 프랑스어로 '막대기'라는 뜻으로, 길쭉한 형태에서 유래합니다."},
    {q:"전통 바게트(baguette de tradition)의 재료로 허용되지 않는 것은?", o:["밀가루","물","이스트","첨가물(개량제·비타민C 제외)"], a:3, e:"프랑스 법에 의해 전통 바게트는 밀가루, 물, 소금, 이스트만 허용됩니다."},
    {q:"팽오쇼콜라(pain au chocolat)에 들어가는 초콜릿의 형태는?", o:["초코칩","초콜릿 바(바톤)","코코아 파우더","초콜릿 시럽"], a:1, e:"팽오쇼콜라에는 바통 드 쇼콜라(bâton de chocolat)라는 막대 형태의 초콜릿을 넣습니다."},
    {q:"브리오슈(brioche)의 특징은?", o:["저유지 린 반죽","버터와 달걀이 풍부한 리치 반죽","호밀 반죽","사워도우 반죽"], a:1, e:"브리오슈는 다량의 버터와 달걀이 들어가는 대표적인 리치(rich) 빵입니다."},
    {q:"'불랑제리(boulangerie)'란?", o:["케이크 가게","빵집(제빵소)","초콜릿 공방","레스토랑"], a:1, e:"Boulangerie는 프랑스어로 빵집(제빵소)을 뜻합니다."},
    {q:"푸가스(fougasse)는 어떤 지역의 전통 빵인가?", o:["파리","프로방스(남프랑스)","노르망디","브르타뉴"], a:1, e:"푸가스는 남프랑스 프로방스 지역의 나뭇잎 모양 전통 납작빵입니다."},
    {q:"에피(épi)란 어떤 모양의 빵인가?", o:["둥근 모양","밀이삭 모양","별 모양","하트 모양"], a:1, e:"에피(épi de blé)는 밀이삭 모양으로 가위로 잘라 만드는 바게트 변형 빵입니다."},
    {q:"쿠프(coupe)를 넣을 때 칼의 각도로 적절한 것은?", o:["90도(수직)","약 30~45도(비스듬히)","0도(수평)","60도"], a:1, e:"쿠프는 약 30~45도로 비스듬히 넣어야 오븐에서 아름답게 벌어집니다."},
    {q:"프랑스 빵의 4대 기본 재료가 아닌 것은?", o:["밀가루","물","소금","버터"], a:3, e:"프랑스 빵의 4대 기본 재료는 밀가루, 물, 소금, 이스트입니다."},
    {q:"캉파뉴(pain de campagne)란?", o:["도시 빵","시골 빵","곡물 빵","단 빵"], a:1, e:"Pain de campagne는 '시골 빵'이라는 뜻으로, 투박하고 소박한 프랑스 전통 빵입니다."},
    {q:"'비에누아즈리(viennoiserie)'란?", o:["비엔나 소시지","크루아상 등 버터가 많은 빵 류","비엔나 커피","오스트리아 요리"], a:1, e:"비에누아즈리는 크루아상·브리오슈·데니쉬 등 버터·달걀이 풍부한 빵 류를 총칭합니다."},
    {q:"쿠글로프(kugelhopf)는 어떤 지역의 빵인가?", o:["알자스","파리","리옹","마르세유"], a:0, e:"쿠글로프는 프랑스 알자스 지역의 전통 발효 빵으로 왕관 모양 틀에 구워냅니다."},
    {q:"미즈 앙 플라스(mise en place)의 뜻은?", o:["반죽하기","정리정돈·사전 준비","구워내기","서빙하기"], a:1, e:"Mise en place는 '제자리에 놓기'라는 뜻으로 조리 전 모든 재료와 도구를 준비하는 것입니다."},
    {q:"바타르(bâtard)란?", o:["크루아상 종류","바게트보다 짧고 통통한 빵","케이크 종류","소스 이름"], a:1, e:"바타르는 바게트와 비슷하지만 더 짧고 통통한 형태의 프랑스 빵입니다."},
    {q:"트레세(tressé)란 어떤 기법인가?", o:["접기 기법","땋기(꼬기) 성형 기법","칼집 기법","코팅 기법"], a:1, e:"트레세는 반죽을 여러 가닥으로 나누어 땋아서 성형하는 기법입니다."},
    {q:"타바티에르(tabatière) 성형이란?", o:["둥글리기","담배갑 모양 접기 성형","꼬기 성형","밀기 성형"], a:1, e:"타바티에르는 반죽을 담배갑 모양으로 접어 성형하는 프랑스 전통 기법입니다."},
    {q:"프랑스에서 빵의 무게와 가격을 법으로 규제하는 빵은?", o:["브리오슈","바게트","크루아상","에피"], a:1, e:"프랑스에서는 바게트의 가격과 성분을 데크레(법령)로 규제합니다."},
    {q:"르꼬르동블루 제빵 초급 과정에서 가장 먼저 배우는 것은?", o:["크루아상","기본 반죽과 발효 이해","케이크 데코","초콜릿 템퍼링"], a:1, e:"초급 과정에서는 기본 반죽 만들기, 발효 원리, 기초 성형 등 제빵의 기본기를 먼저 배웁니다."},
    {q:"프랑스 빵에서 '클루트(cloche)'란?", o:["빵 바구니","돔 형태의 덮개로 스팀 효과","칼 종류","밀가루 종류"], a:1, e:"클루트는 돔 모양 덮개로, 가정에서 바게트 등을 구울 때 스팀 효과를 내기 위해 사용합니다."},
    // ── B. 프랑스어 전문 용어 ──
    {q:"'페트리사주(pétrissage)'란?", o:["성형하기","반죽하기","발효시키기","굽기"], a:1, e:"Pétrissage는 재료를 혼합하여 반죽하는 과정을 뜻하는 프랑스어입니다."},
    {q:"'퐁타주(pointage)'란 제빵 공정에서 무엇인가?", o:["분할","1차 발효","2차 발효","굽기"], a:1, e:"Pointage는 믹싱 후 첫 번째 발효(벌크 발효)를 뜻합니다."},
    {q:"'아프레(apprêt)'란?", o:["1차 발효","성형","2차 발효(최종 발효)","냉각"], a:2, e:"Apprêt는 성형 후 오븐에 넣기 전 최종 발효 단계입니다."},
    {q:"'파소나주(façonnage)'의 뜻은?", o:["발효","성형","분할","굽기"], a:1, e:"Façonnage는 반죽을 원하는 형태로 만드는 성형 과정입니다."},
    {q:"'퀴송(cuisson)'이란?", o:["냉각","발효","굽기","반죽"], a:2, e:"Cuisson은 오븐에서 빵을 굽는 과정을 뜻하는 프랑스어입니다."},
    {q:"'투라주(tourage)'란 어떤 기법인가?", o:["반죽을 접어 층을 만드는 기법","발효 기법","굽기 기법","장식 기법"], a:0, e:"Tourage는 크루아상·퓌유타주에서 반죽과 버터를 반복 접어 층을 만드는 기법입니다."},
    {q:"'프라자주(frasage)'란?", o:["고속 믹싱","손바닥으로 반죽을 밀어 합치기","체에 치기","발효시키기"], a:1, e:"Frasage는 타르트 반죽 등에서 손바닥으로 재료를 밀듯이 합치는 기법입니다."},
    {q:"'사블라주(sablage)'란?", o:["설탕 코팅","밀가루와 버터를 비벼 모래 상태로 만들기","반죽 발효","체 치기"], a:1, e:"Sablage는 밀가루와 차가운 버터를 손끝으로 비벼 모래(sable) 같은 상태를 만드는 기법입니다."},
    {q:"'도뤼르(dorure)'란?", o:["반죽 굽기","달걀물 바르기","설탕 뿌리기","냉각하기"], a:1, e:"Dorure는 빵 표면에 달걀물을 발라 광택과 색을 내는 것입니다."},
    {q:"'플뢰레(fleurer)'란?", o:["꽃 장식하기","작업대에 밀가루를 뿌리기","반죽 접기","발효시키기"], a:1, e:"Fleurer는 반죽이 달라붙지 않도록 작업대에 밀가루를 가볍게 뿌리는 것입니다."},
    {q:"'퐁세(foncer)'란?", o:["반죽을 틀에 깔기","반죽 자르기","크림 짜기","반죽 접기"], a:0, e:"Foncer는 타르트 틀 등에 반죽을 깔아 넣는 작업입니다."},
    {q:"'피케(piquer)'란?", o:["반죽에 포크로 구멍 내기","반죽 자르기","설탕 뿌리기","반죽 접기"], a:0, e:"Piquer는 포크나 도크(docker)로 반죽에 구멍을 내어 굽기 중 부풀어 오르는 것을 방지합니다."},
    {q:"'크렘 파티시에르(crème pâtissière)'란?", o:["생크림","커스터드 크림","버터크림","아몬드 크림"], a:1, e:"Crème pâtissière는 우유·설탕·달걀·밀가루로 만드는 커스터드 크림입니다."},
    {q:"'아베세(abaisser)'란?", o:["반죽을 밀대로 밀어 펴기","반죽 접기","크림 바르기","반죽 굽기"], a:0, e:"Abaisser는 밀대(rouleau)로 반죽을 원하는 두께로 밀어 펴는 것입니다."},
    {q:"'뵈르 드 투라주(beurre de tourage)'란?", o:["일반 식용 버터","접기용 고지방 건조 버터","무염버터","마가린"], a:1, e:"Beurre de tourage는 수분 함량이 낮고 지방 함량이 높아(84% 이상) 크루아상 등 접기 작업에 최적화된 전문 버터입니다."},
    // ── C. 온도·비율·계산 ──
    {q:"이스트가 사멸하는 온도는?", o:["40°C","50°C","60°C 이상","80°C"], a:2, e:"이스트는 약 60°C 이상에서 사멸합니다."},
    {q:"마이야르 반응이 본격적으로 시작되는 온도는?", o:["80~100°C","100~120°C","140~165°C","200°C 이상"], a:2, e:"마이야르 반응은 약 140~165°C에서 본격적으로 진행되어 빵 표면의 갈색과 향이 발달합니다."},
    {q:"캐러멜화가 시작되는 온도는?", o:["100°C","130°C","약 170°C","200°C"], a:2, e:"설탕의 캐러멜화는 약 170°C 이상에서 시작됩니다."},
    {q:"크루아상 반죽의 버터 비율(밀가루 대비)은 보통?", o:["약 10~15%","약 25~30%","약 40~50%","약 70%"], a:2, e:"크루아상은 밀가루 대비 약 40~50%의 버터를 접기용으로 사용합니다."},
    {q:"바게트의 표준 무게는 프랑스 법규상 약?", o:["100g","250g","약 250~300g","500g"], a:2, e:"프랑스 전통 바게트는 약 250~300g이 표준입니다."},
    {q:"식빵 반죽에서 소금의 일반적 사용량(밀가루 대비)은?", o:["약 0.5%","약 2%","약 5%","약 8%"], a:1, e:"제빵에서 소금은 밀가루 대비 약 1.8~2%를 사용합니다."},
    {q:"브리오슈 반죽의 버터 함량(밀가루 대비)은?", o:["약 10~20%","약 30~40%","약 50~80%","약 100%"], a:2, e:"브리오슈는 리치 반죽으로 밀가루 대비 50~80%의 많은 버터가 들어갑니다."},
    {q:"초콜릿 템퍼링 시 다크 초콜릿의 작업 온도로 올바른 것은?", o:["25~27°C → 31~32°C","28~29°C → 34~35°C","20~22°C → 25°C","35~38°C → 40°C"], a:0, e:"다크 초콜릿 템퍼링은 50°C로 녹인 후 25~27°C로 냉각, 다시 31~32°C로 올려 작업합니다."},
    {q:"설탕 끓이기에서 '소프트볼(petit boulé)' 단계의 온도는?", o:["100~103°C","112~116°C","132~143°C","160°C 이상"], a:1, e:"소프트볼 단계는 112~116°C로, 이탈리안 머랭의 시럽 온도입니다."},
    {q:"설탕 끓이기에서 '하드크랙(grand cassé)' 단계 온도는?", o:["121~130°C","132~143°C","149~154°C","170°C 이상"], a:2, e:"하드크랙 단계는 149~154°C로, 누가틴·슈크르 티레 등에 사용합니다."},
    // ── D. 제빵 과학·문제 해결 ──
    {q:"글루텐 윈도우 테스트란?", o:["오븐 온도 확인법","반죽을 얇게 펴 투명하면 글루텐 충분","발효 상태 확인법","빵 색 확인법"], a:1, e:"반죽을 얇게 펼쳤을 때 찢어지지 않고 빛이 투과되면 글루텐이 충분히 발달된 것입니다."},
    {q:"발효 확인 시 '핑거 테스트'란?", o:["반죽 맛보기","손가락으로 눌러 복원 속도로 발효 판단","반죽 온도 확인","글루텐 확인"], a:1, e:"반죽을 손가락으로 눌렀을 때 천천히 일부만 복원되면 적절한 발효 상태입니다."},
    {q:"빵이 구운 후 옆면이 주저앉는(케이빙) 원인이 아닌 것은?", o:["과발효","불충분한 굽기","틀에서 너무 빨리 꺼냄","적정 반죽 온도"], a:3, e:"케이빙은 과발효, 덜 구워짐, 냉각 전 충격 부족 등이 원인이며, 적정 반죽 온도는 오히려 바람직합니다."},
    {q:"빵 속이 끈적이는(gummy) 원인은?", o:["과도한 이스트","덜 구워짐(내부 온도 미달)","소금 과다","설탕 부족"], a:1, e:"빵 내부 온도가 충분히 오르지 않으면 전분 호화가 불완전하여 끈적이는 식감이 됩니다."},
    {q:"빵 표면이 너무 두껍고 딱딱한 원인은?", o:["스팀 부족","오븐 온도가 너무 낮음","과발효","소금 부족"], a:0, e:"스팀이 부족하면 반죽 표면이 빨리 건조되어 오븐 스프링이 부족하고 껍질이 두꺼워집니다."},
    {q:"크루아상이 바삭하지 않고 질긴 원인은?", o:["버터 온도가 적절했다","접기 시 버터가 녹아 반죽에 흡수","발효가 적절했다","오븐 온도가 적절했다"], a:1, e:"접기 작업 중 버터가 녹으면 층이 분리되지 않아 바삭한 식감이 나오지 않습니다."},
    {q:"오버프루핑(과발효) 된 바게트의 특징이 아닌 것은?", o:["쿠프가 잘 벌어지지 않음","납작하게 퍼짐","신맛이 남","볼륨이 매우 큼"], a:3, e:"과발효된 반죽은 가스 보유력이 떨어져 오히려 볼륨이 줄고 납작해집니다."},
    {q:"빵 내부에 큰 구멍(터널)이 생기는 원인은?", o:["발효 부족","성형 시 가스 빼기 불충분","소금 과다","오븐 온도 낮음"], a:1, e:"성형 시 반죽 내부의 큰 기포를 제거하지 않으면 굽기 중 팽창하여 큰 구멍이 됩니다."},
    {q:"프랑스에서 'pain'이란?", o:["케이크","빵","밀가루","버터"], a:1, e:"Pain은 프랑스어로 빵을 뜻합니다."},
    {q:"전분의 노화(retrogradation)란?", o:["전분이 녹는 현상","호화된 전분이 다시 결정화되어 딱딱해지는 현상","전분이 당으로 분해되는 현상","전분이 물을 흡수하는 현상"], a:1, e:"노화(retrogradation)는 호화된 전분 분자가 다시 결정 구조로 돌아가 빵이 딱딱해지는 현상입니다."},
    // ── E. 식품 위생·안전 ──
    {q:"HACCP의 한국어 뜻은?", o:["식품안전관리인증기준","위해요소중점관리기준","식품위생관리기준","위생안전관리기준"], a:1, e:"HACCP(Hazard Analysis Critical Control Point)는 위해요소중점관리기준입니다."},
    {q:"살모넬라 식중독의 주요 원인 식품은?", o:["곡류","채소","계란 및 가금류","통조림"], a:2, e:"살모넬라균은 계란, 닭고기 등 가금류에서 주로 발견됩니다."},
    {q:"식품을 취급할 때 손을 씻어야 하는 시점이 아닌 것은?", o:["화장실 사용 후","생고기 취급 후","같은 반죽 작업 중","코·입을 만진 후"], a:2, e:"같은 반죽을 계속 작업하는 도중에는 교차오염 위험이 없으므로 해당하지 않습니다."},
    {q:"제과제빵 작업장의 적정 온도는?", o:["15~20°C","20~25°C","30~35°C","35~40°C"], a:1, e:"작업장은 20~25°C로 유지하여 반죽 온도를 관리하고 위생을 확보합니다."},
    {q:"냉장 보관 온도로 올바른 것은?", o:["-18°C 이하","0~10°C","10~20°C","20~30°C"], a:1, e:"냉장은 0~10°C(보통 5°C 이하 권장)에서 보관합니다."},
    {q:"교차오염(cross contamination)이란?", o:["같은 재료를 두 번 사용","오염된 식품에서 깨끗한 식품으로 세균 이동","식품을 오래 방치","식품 포장 파손"], a:1, e:"교차오염은 도마·칼·손 등을 통해 오염원에서 다른 식품으로 세균이 이동하는 것입니다."},
    {q:"황색포도상구균 식중독의 특징은?", o:["잠복기가 매우 길다","독소(엔테로톡신)가 열에 강하다","물에서만 발견된다","항생제로만 예방 가능하다"], a:1, e:"황색포도상구균이 생성한 엔테로톡신은 100°C에서도 파괴되지 않아 가열해도 식중독을 유발합니다."},
    {q:"식품의 위험 온도대(danger zone)는?", o:["0~5°C","-18~0°C","5~60°C","60~100°C"], a:2, e:"5~60°C에서 세균이 가장 활발히 증식하므로 이 온도대에 식품을 오래 방치하면 안 됩니다."},
    // ── F. 제과 기초·크림·반죽 ──
    {q:"제누아즈(génoise)란?", o:["파이 반죽","달걀과 설탕을 기포시켜 만든 스펀지케이크","슈 반죽","타르트 반죽"], a:1, e:"제누아즈는 전란에 설탕을 넣고 기포시킨 후 밀가루를 섞어 만드는 기본 스펀지케이크입니다."},
    {q:"파트 브리제(pâte brisée)란?", o:["슈 반죽","바삭한 기본 타르트 반죽","크루아상 반죽","브리오슈 반죽"], a:1, e:"Pâte brisée는 버터·밀가루·물·소금으로 만드는 가장 기본적인 타르트 반죽입니다."},
    {q:"파트 쉬크레(pâte sucrée)란?", o:["소금 반죽","설탕이 들어간 달콤한 타르트 반죽","발효 반죽","슈 반죽"], a:1, e:"Pâte sucrée는 설탕·버터·달걀이 들어가 달콤하고 쿠키처럼 바삭한 타르트 반죽입니다."},
    {q:"파트 사블레(pâte sablée)의 특징은?", o:["쫄깃한 식감","모래처럼 부서지는 바삭한 식감","촉촉한 식감","끈적이는 식감"], a:1, e:"Sablée는 '모래(sable)' 같다는 뜻으로, 버터 함량이 높아 모래처럼 부서지는 식감이 특징입니다."},
    {q:"파트 퓌유테(pâte feuilletée)란?", o:["슈 반죽","접어서 층을 만든 퍼프 페이스트리 반죽","스펀지 반죽","타르트 반죽"], a:1, e:"Pâte feuilletée는 반죽과 버터를 겹겹이 접어 수백 겹의 층을 만든 퍼프 페이스트리입니다."},
    {q:"슈 반죽(pâte à choux)의 특징은?", o:["오븐에서 부풀지 않음","반죽 자체에 수분이 많아 오븐에서 증기로 부풀어 오름","이스트로 발효","냉동해야 부풀어 오름"], a:1, e:"슈 반죽은 물·버터·밀가루를 끓여 만들며, 수분이 증기가 되면서 속이 빈 상태로 부풀어 오릅니다."},
    {q:"크렘 앙글레즈(crème anglaise)란?", o:["버터크림","우유·설탕·달걀노른자로 만든 영국식 커스터드 소스","생크림","아몬드 크림"], a:1, e:"Crème anglaise는 달걀노른자를 주재료로 한 얇은 커스터드 소스로, 아이스크림의 기본이 됩니다."},
    {q:"이탈리안 머랭(meringue italienne)의 특징은?", o:["달걀흰자에 설탕만 넣고 휘핑","뜨거운 설탕 시럽(118°C)을 흰자에 부어 만듦","오븐에서 구워 만듦","버터가 들어감"], a:1, e:"이탈리안 머랭은 118°C의 설탕 시럽을 흰자에 부으며 휘핑하여 안정적이고 살균 효과가 있습니다."},
    {q:"프렌치 머랭과 스위스 머랭의 차이점은?", o:["같은 것이다","프렌치는 생 상태 휘핑, 스위스는 중탕 가열 후 휘핑","프렌치가 더 안정적","스위스가 더 간단함"], a:1, e:"프렌치 머랭은 흰자에 설탕을 직접 넣어 휘핑, 스위스 머랭은 중탕(bain-marie)으로 50°C까지 가열 후 휘핑합니다."},
    {q:"크렘 오 뵈르(crème au beurre)란?", o:["생크림","커스터드 크림","버터크림","치즈크림"], a:2, e:"Crème au beurre는 머랭이나 봄브(pâte à bombe)에 버터를 섞어 만든 버터크림입니다."},
    // ── G. 추가 제빵 심화 ──
    {q:"프랑스 밀가루 분류에서 T45의 특성은?", o:["회분 높고 거침","회분 약 0.45%, 가장 곱고 흰 밀가루","글루텐이 없음","호밀가루"], a:1, e:"T45는 회분 0.45% 이하로 가장 정제된 흰 밀가루이며, 제과(파티스리)에 주로 사용합니다."},
    {q:"T65 밀가루는 주로 어디에 사용하는가?", o:["케이크","전통 바게트(바게트 드 트라디시옹)","비스킷","소스"], a:1, e:"T65는 회분 0.62~0.75%로 적당한 풍미가 있어 전통 바게트(baguette de tradition)에 사용합니다."},
    {q:"'불(boule)'이란?", o:["밀가루 종류","둥근 모양으로 성형한 빵","오븐 종류","발효 방법"], a:1, e:"Boule는 둥글게 성형한 빵으로, '불랑제(boulanger)'라는 말의 어원이기도 합니다."},
    {q:"바네통(banneton)이란?", o:["빵칼","발효 바구니","오븐 트레이","밀대"], a:1, e:"Banneton은 2차 발효 시 반죽을 넣어 형태를 유지시키는 천연 소재 발효 바구니입니다."},
    {q:"쿠프를 넣는 칼을 프랑스어로 무엇이라 하는가?", o:["쿠토(couteau)","라므(lame)","포셰트(fourchette)","시조(ciseau)"], a:1, e:"Lame는 바게트 등에 쿠프를 넣는 전용 칼(면도날)입니다."},
    {q:"'그리뉴(grigne)'란?", o:["빵 속살","쿠프가 벌어져 생긴 빵 표면의 돌출 부분","발효종","밀가루 종류"], a:1, e:"Grigne는 쿠프가 오븐에서 벌어지며 생기는 귀 모양의 돌출부로, 바게트 품질의 지표입니다."},
    {q:"'미(mie)'란?", o:["빵 껍질","빵의 속살(내부 조직)","발효종","밀가루"], a:1, e:"Mie는 빵의 내부 조직(크럼)을 뜻하며, pain de mie(팡 드 미)는 부드러운 속살의 식빵입니다."},
    {q:"'크루트(croûte)'란?", o:["빵의 속살","빵의 외피(껍질)","발효종","버터 종류"], a:1, e:"Croûte는 빵의 바깥쪽 딱딱한 껍질을 뜻합니다."},
    {q:"단백질 응고 온도는 약?", o:["40~50°C","60~70°C","70~80°C","90~100°C"], a:2, e:"빵 반죽의 단백질(글루텐)은 약 70~80°C에서 응고되어 빵의 구조를 형성합니다."},
    {q:"'르쉬페(ressuage)'란?", o:["발효 과정","굽기 직후 빵에서 수분과 알코올이 빠져나가는 냉각 과정","반죽 과정","성형 과정"], a:1, e:"Ressuage는 빵이 오븐에서 나온 후 내부의 수증기와 알코올이 빠져나가며 냉각되는 과정입니다. 이때 자르면 속이 끈적입니다."},
    {q:"'비가(biga)'와 '풀리쉬(poolish)'의 공통점은?", o:["둘 다 르방이다","둘 다 사전 발효종(pre-ferment)이다","둘 다 고체이다","둘 다 액체이다"], a:1, e:"비가와 풀리쉬 모두 사전 발효종으로, 빵의 풍미와 조직을 개선하기 위해 미리 발효시키는 반죽입니다."},
    {q:"베이커 퍼센트에서 밀가루 500g, 물 325g일 때 수화율은?", o:["50%","55%","60%","65%"], a:3, e:"수화율 = (물/밀가루)×100 = (325/500)×100 = 65%입니다."},
    {q:"'오토리즈' 시 소금을 넣지 않는 이유는?", o:["맛이 변해서","소금이 글루텐 형성을 방해하므로","소금이 녹지 않으므로","색이 변해서"], a:1, e:"오토리즈 단계에서는 소금이 글루텐 형성을 억제하므로 넣지 않고, 밀가루와 물만으로 자연 수화를 진행합니다."},
    {q:"'발효(fermentation)'의 3가지 산물은?", o:["CO₂, 알코올, 열","CO₂, 알코올, 유기산","O₂, 알코올, 열","CO₂, 물, 소금"], a:1, e:"발효 시 이스트는 CO₂(가스), 알코올, 유기산을 생성합니다. 유기산이 빵의 풍미를 만듭니다."},
    {q:"'팡 비에누아(pain viennois)'란?", o:["호밀빵","버터·설탕·우유가 들어간 부드러운 비엔나풍 빵","바게트의 다른 이름","사워도우 빵"], a:1, e:"Pain viennois는 비엔나 스타일의 부드러운 빵으로, 버터·설탕·우유가 들어가 달콤하고 촉촉합니다."},
    {q:"'팡 콩플레(pain complet)'란?", o:["흰 밀가루 빵","통밀빵","호밀빵","옥수수빵"], a:1, e:"Pain complet는 통밀가루(farine complète)로 만든 빵으로, 겨와 배아가 포함되어 영양이 풍부합니다."},
    {q:"'크레메(crémer)'란?", o:["크림을 바르기","버터와 설탕을 부드럽게 섞어 공기를 넣기","발효시키기","굽기"], a:1, e:"Crémer는 버터와 설탕을 부드럽게 휘핑하여 공기를 함입시키는 크림화(creaming) 과정입니다."},
    {q:"'블랑시르(blanchir)'란 제과에서 무슨 뜻인가?", o:["표백하기","달걀노른자와 설탕을 희게 될 때까지 휘핑","냉각하기","체에 치기"], a:1, e:"제과에서 blanchir는 노른자와 설탕을 리본 상태(faire le ruban)가 될 때까지 희고 걸쭉하게 휘핑하는 것입니다."},
    {q:"'나페(napper)'란?", o:["반죽 자르기","소스나 크림으로 고르게 코팅하기","반죽 접기","발효시키기"], a:1, e:"Napper는 케이크나 디저트 표면을 소스·글라사주 등으로 고르게 덮는 것입니다."},
    {q:"'팡 오 레(pain au lait)'란?", o:["우유가 들어간 부드러운 빵","레몬 빵","호밀빵","치즈빵"], a:0, e:"Pain au lait는 우유(lait)가 들어가 부드럽고 촉촉한 프랑스 빵입니다."}
];

let quizState = {}; // {rounds:[{indices,answered,submitted},...]}
let quizCurrentRound = 0;
let quizShowHistory = false;
let quizHistoryDetail = null; // {dateKey, round}

function qSeed(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
    return Math.abs(h);
}

function qShuffle(arr, seed) {
    const r = [...arr]; let s = seed;
    for (let i = r.length - 1; i > 0; i--) {
        s = (s * 16807) % 2147483647;
        const j = s % (i + 1);
        [r[i], r[j]] = [r[j], r[i]];
    }
    return r;
}

function qDateKey(d) {
    d = d || new Date();
    return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function qDateLabel(key) {
    return key.slice(0,4) + '년 ' + parseInt(key.slice(4,6)) + '월 ' + parseInt(key.slice(6,8)) + '일';
}

function qLoad(dateKey) {
    const s = localStorage.getItem('quiz2_' + dateKey);
    return s ? JSON.parse(s) : {rounds:[]};
}

function qSave(dateKey, state) {
    localStorage.setItem('quiz2_' + dateKey, JSON.stringify(state));
}

function qGetIndices(dateKey, roundIdx) {
    const seed = qSeed(dateKey + '_r' + roundIdx);
    const all = Array.from({length: QB.length}, (_, i) => i);
    const shuffled = qShuffle(all, seed);
    // 이전 라운드에서 사용한 문제 제외
    const used = new Set();
    const state = qLoad(dateKey);
    for (let r = 0; r < roundIdx; r++) {
        if (state.rounds[r]) state.rounds[r].indices.forEach(i => used.add(i));
    }
    const available = shuffled.filter(i => !used.has(i));
    // 다른 날 사용한 문제도 최근 3일 내 제외 시도
    const recentUsed = new Set();
    for (let d = 1; d <= 3; d++) {
        const dt = new Date();
        dt.setDate(dt.getDate() - d);
        const dk = qDateKey(dt);
        const ps = qLoad(dk);
        ps.rounds.forEach(r => r.indices.forEach(i => recentUsed.add(i)));
    }
    const fresh = available.filter(i => !recentUsed.has(i));
    const pool = fresh.length >= 10 ? fresh : available.length >= 10 ? available : shuffled;
    return pool.slice(0, 10);
}

function qGetAllHistoryKeys() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('quiz2_')) {
            const dk = k.replace('quiz2_', '');
            const state = qLoad(dk);
            if (state.rounds.length > 0 && state.rounds.some(r => r.submitted)) {
                keys.push(dk);
            }
        }
    }
    keys.sort().reverse();
    return keys;
}

function renderQuizPage() {
    const content = $('quiz-content');
    if (!content) return;
    const histBar = $('quiz-history-bar');
    const mainView = $('quiz-main-view');
    const histView = $('quiz-history-view');
    const container = $('quiz-questions');
    const statusEl = $('quiz-status');
    const resultEl = $('quiz-result');

    if (quizShowHistory) {
        mainView.classList.add('hidden');
        histView.classList.remove('hidden');
        renderQuizHistory();
        histBar.innerHTML = '<button class="quiz-history-btn active" id="quiz-back-main">< 오늘 문제로</button><span class="quiz-stat-bar"></span>';
        $('quiz-back-main').onclick = () => { quizShowHistory = false; quizHistoryDetail = null; renderQuizPage(); };
        return;
    }

    mainView.classList.remove('hidden');
    histView.classList.add('hidden');

    const dateKey = qDateKey();
    quizState = qLoad(dateKey);

    // 첫 진입 시 라운드 없으면 생성
    if (quizState.rounds.length === 0) {
        quizState.rounds.push({indices: qGetIndices(dateKey, 0), answered: {}, submitted: false});
        qSave(dateKey, quizState);
    }

    // 현재 라운드가 범위를 벗어나면 마지막 라운드로
    if (quizCurrentRound >= quizState.rounds.length) quizCurrentRound = quizState.rounds.length - 1;

    const round = quizState.rounds[quizCurrentRound];
    const totalRounds = quizState.rounds.length;

    // 히스토리 바
    const hKeys = qGetAllHistoryKeys();
    const todayKey = qDateKey();
    const pastKeys = hKeys.filter(k => k !== todayKey);
    histBar.innerHTML = (pastKeys.length > 0 ? '<button class="quiz-history-btn" id="quiz-show-hist">이전 문항 다시보기</button>' : '<span></span>') +
        '<span class="quiz-stat-bar">총 ' + QB.length + '문항 중 ' + totalRounds + '회차</span>';
    if ($('quiz-show-hist')) $('quiz-show-hist').onclick = () => { quizShowHistory = true; renderQuizPage(); };

    // 상태
    const dateLabel = qDateLabel(dateKey);
    statusEl.innerHTML = '<span class="quiz-date">' + dateLabel + '</span><span class="quiz-round-badge">' + (quizCurrentRound + 1) + '회차</span>';

    // 라운드 탭 (여러 회차 있을 때)
    let tabHtml = '';
    if (totalRounds > 1) {
        tabHtml += '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">';
        for (let r = 0; r < totalRounds; r++) {
            const rd = quizState.rounds[r];
            let score = '';
            if (rd.submitted) {
                let c = 0; rd.indices.forEach((qi, i) => { if (rd.answered[i] === QB[qi].a) c++; });
                score = ' (' + c + '/10)';
            }
            tabHtml += '<button class="quiz-history-btn' + (r === quizCurrentRound ? ' active' : '') + '" data-round="' + r + '">' + (r+1) + '회차' + score + '</button>';
        }
        tabHtml += '</div>';
    }

    // 문제 렌더링
    let html = tabHtml;
    const labels = ['①','②','③','④'];
    round.indices.forEach((qIdx, i) => {
        const q = QB[qIdx];
        html += '<div class="quiz-question-card">';
        html += '<div class="quiz-q-number">문제 ' + (i+1) + '</div>';
        html += '<div class="quiz-q-text">' + q.q + '</div>';
        html += '<div class="quiz-options">';
        q.o.forEach((opt, oi) => {
            let cls = 'quiz-option';
            if (round.submitted) {
                cls += ' disabled';
                if (oi === q.a) cls += ' correct';
                else if (round.answered[i] === oi && oi !== q.a) cls += ' wrong';
            } else if (round.answered[i] === oi) {
                cls += ' selected';
            }
            html += '<div class="' + cls + '" data-q="' + i + '" data-o="' + oi + '">';
            html += '<span class="quiz-option-num">' + labels[oi] + '</span>';
            html += '<span>' + opt + '</span></div>';
        });
        html += '</div>';
        if (round.submitted) html += '<div class="quiz-explanation">' + q.e + '</div>';
        html += '</div>';
    });

    if (!round.submitted) {
        const cnt = Object.keys(round.answered).length;
        html += '<button class="quiz-submit-btn" id="quiz-submit-btn"' + (cnt < 10 ? ' disabled' : '') + '>채점하기 (' + cnt + '/10)</button>';
    }

    // 채점 완료 후 추가 문제 버튼
    if (round.submitted && quizCurrentRound === totalRounds - 1) {
        // 아직 문제가 남아있는지 확인
        const usedCount = quizState.rounds.reduce((s, r) => s + r.indices.length, 0);
        if (usedCount < QB.length) {
            html += '<button class="quiz-more-btn" id="quiz-more-btn">+ 추가 문제 10문항</button>';
        } else {
            html += '<div style="text-align:center;padding:20px;color:var(--text-light);">모든 문항을 완료했습니다!</div>';
        }
    }

    container.innerHTML = html;

    // 결과
    if (round.submitted) {
        let correct = 0;
        round.indices.forEach((qIdx, i) => { if (round.answered[i] === QB[qIdx].a) correct++; });
        resultEl.classList.remove('hidden');
        const passed = correct >= 6;
        resultEl.innerHTML = '<div class="quiz-result-score">' + correct + ' / 10</div>' +
            '<div class="quiz-result-text">정답률 ' + (correct * 10) + '%</div>' +
            '<div class="quiz-result-msg ' + (passed ? 'pass' : 'fail') + '">' + (passed ? '합격! 잘 하셨어요' : '아쉬워요... 다시 도전해보세요') + '</div>';
    } else {
        resultEl.classList.add('hidden');
    }

    // 이벤트: 라운드 탭
    container.querySelectorAll('[data-round]').forEach(btn => {
        btn.addEventListener('click', () => {
            quizCurrentRound = parseInt(btn.dataset.round);
            renderQuizPage();
        });
    });

    // 이벤트: 답 선택
    if (!round.submitted) {
        container.querySelectorAll('.quiz-option').forEach(el => {
            el.addEventListener('click', () => {
                round.answered[parseInt(el.dataset.q)] = parseInt(el.dataset.o);
                qSave(dateKey, quizState);
                renderQuizPage();
            });
        });
        const submitBtn = $('quiz-submit-btn');
        if (submitBtn) submitBtn.addEventListener('click', () => {
            if (Object.keys(round.answered).length < 10) return;
            round.submitted = true;
            qSave(dateKey, quizState);
            renderQuizPage();
            content.scrollTop = 0;
        });
    }

    // 이벤트: 추가 문제
    const moreBtn = $('quiz-more-btn');
    if (moreBtn) moreBtn.addEventListener('click', () => {
        const newRound = quizState.rounds.length;
        quizState.rounds.push({indices: qGetIndices(dateKey, newRound), answered: {}, submitted: false});
        qSave(dateKey, quizState);
        quizCurrentRound = newRound;
        renderQuizPage();
        content.scrollTop = 0;
    });
}

function renderQuizHistory() {
    const histView = $('quiz-history-view');
    const keys = qGetAllHistoryKeys().filter(k => k !== qDateKey());

    if (quizHistoryDetail) {
        // 특정 날짜의 상세 보기
        const dk = quizHistoryDetail.dateKey;
        const state = qLoad(dk);
        let html = '<button class="quiz-back-btn" id="quiz-back-list">< 목록으로</button>';
        html += '<div class="quiz-status"><span class="quiz-date">' + qDateLabel(dk) + '</span></div>';

        state.rounds.forEach((round, ri) => {
            if (!round.submitted) return;
            let correct = 0;
            round.indices.forEach((qi, i) => { if (round.answered[i] === QB[qi].a) correct++; });
            html += '<div style="margin:14px 0 8px;font-weight:700;color:var(--primary);">' + (ri+1) + '회차 (' + correct + '/10)</div>';
            const labels = ['①','②','③','④'];
            round.indices.forEach((qIdx, i) => {
                const q = QB[qIdx];
                html += '<div class="quiz-question-card">';
                html += '<div class="quiz-q-number">문제 ' + (i+1) + '</div>';
                html += '<div class="quiz-q-text">' + q.q + '</div>';
                html += '<div class="quiz-options">';
                q.o.forEach((opt, oi) => {
                    let cls = 'quiz-option disabled';
                    if (oi === q.a) cls += ' correct';
                    else if (round.answered[i] === oi && oi !== q.a) cls += ' wrong';
                    html += '<div class="' + cls + '">';
                    html += '<span class="quiz-option-num">' + labels[oi] + '</span>';
                    html += '<span>' + opt + '</span></div>';
                });
                html += '</div>';
                html += '<div class="quiz-explanation">' + q.e + '</div>';
                html += '</div>';
            });
        });
        histView.innerHTML = html;
        $('quiz-back-list').onclick = () => { quizHistoryDetail = null; renderQuizHistory(); };
        return;
    }

    // 목록 보기
    let html = '<div class="quiz-history-list">';
    if (keys.length === 0) {
        html += '<div class="empty-state"><span>📋</span><span>아직 이전 기록이 없어요</span></div>';
    }
    keys.forEach(dk => {
        const state = qLoad(dk);
        let totalCorrect = 0, totalQ = 0;
        state.rounds.forEach(r => {
            if (!r.submitted) return;
            r.indices.forEach((qi, i) => { if (r.answered[i] === QB[qi].a) totalCorrect++; totalQ++; });
        });
        const roundCount = state.rounds.filter(r => r.submitted).length;
        html += '<div class="quiz-history-item" data-dk="' + dk + '">';
        html += '<div><div class="quiz-history-date">' + qDateLabel(dk) + '</div>';
        html += '<div class="quiz-history-score">' + roundCount + '회차 · ' + totalCorrect + '/' + totalQ + '점</div></div>';
        html += '<span class="quiz-history-arrow">></span></div>';
    });
    html += '</div>';
    histView.innerHTML = html;

    histView.querySelectorAll('.quiz-history-item').forEach(el => {
        el.addEventListener('click', () => {
            quizHistoryDetail = {dateKey: el.dataset.dk};
            renderQuizHistory();
        });
    });
}
