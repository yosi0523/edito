<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EditO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 로딩 화면 -->
        <div id="loading-screen">
            <div class="loading-spinner"></div>
            <p>로딩 중...</p>
        </div>

        <!-- 로그인 화면 -->
        <div id="login-screen" class="screen hidden">
            <div class="login-container">
                <div class="login-logo">
                    <div class="logo-icon">📅</div>
                    <h1>EditO</h1>
                    <p>나만의 캘린더 & 메모</p>
                </div>
                <button id="google-login-btn" class="google-btn">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                    Google로 로그인
                </button>
            </div>
        </div>

        <!-- 메인 화면 -->
        <div id="main-screen" class="screen hidden">
            <!-- 상단 헤더 -->
            <header class="header">
                <div class="header-left">
                    <button id="prev-month" class="nav-btn">&lt;</button>
                    <h2 id="current-month"></h2>
                    <button id="next-month" class="nav-btn">&gt;</button>
                </div>
                <div class="header-right">
                    <button id="today-btn" class="today-btn">오늘</button>
                    <button id="user-menu-btn" class="user-btn">
                        <img id="user-avatar" src="" alt="프로필">
                    </button>
                </div>
            </header>

            <!-- 유저 메뉴 드롭다운 -->
            <div id="user-menu" class="user-menu hidden">
                <p id="user-name"></p>
                <button id="logout-btn">로그아웃</button>
            </div>

            <!-- 요일 헤더 -->
            <div class="weekday-header">
                <span class="sun">일</span>
                <span>월</span>
                <span>화</span>
                <span>수</span>
                <span>목</span>
                <span>금</span>
                <span class="sat">토</span>
            </div>

            <!-- 캘린더 그리드 -->
            <div id="calendar-grid" class="calendar-grid"></div>

            <!-- 하단 탭 -->
            <nav class="bottom-nav">
                <button class="nav-tab active" data-tab="calendar">
                    <span class="tab-icon">📅</span>
                    <span class="tab-label">캘린더</span>
                </button>
                <button class="nav-tab" data-tab="memo">
                    <span class="tab-icon">📝</span>
                    <span class="tab-label">메모</span>
                </button>
            </nav>

            <!-- 일정 추가 FAB 버튼 -->
            <button id="add-event-btn" class="fab-btn">+</button>
        </div>

        <!-- 메모 화면 -->
        <div id="memo-screen" class="screen hidden">
            <header class="header">
                <div class="header-left">
                    <h2>메모</h2>
                </div>
                <div class="header-right">
                    <button id="user-menu-btn2" class="user-btn">
                        <img id="user-avatar2" src="" alt="프로필">
                    </button>
                </div>
            </header>

            <div id="memo-list" class="memo-list"></div>

            <nav class="bottom-nav">
                <button class="nav-tab" data-tab="calendar">
                    <span class="tab-icon">📅</span>
                    <span class="tab-label">캘린더</span>
                </button>
                <button class="nav-tab active" data-tab="memo">
                    <span class="tab-icon">📝</span>
                    <span class="tab-label">메모</span>
                </button>
            </nav>

            <button id="add-memo-btn" class="fab-btn">+</button>
        </div>

        <!-- 일별 상세 화면 -->
        <div id="day-detail" class="modal hidden">
            <div class="modal-content day-detail-content">
                <div class="modal-header">
                    <h3 id="day-detail-title"></h3>
                    <button class="close-btn" id="close-day-detail">&times;</button>
                </div>
                <div id="day-events-list" class="day-events-list"></div>
                <button id="add-event-day-btn" class="add-event-day-btn">+ 일정 추가</button>
            </div>
        </div>

        <!-- 일정 추가/수정 모달 -->
        <div id="event-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="event-modal-title">일정 추가</h3>
                    <button class="close-btn" id="close-event-modal">&times;</button>
                </div>
                <form id="event-form">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="event-title" placeholder="일정 제목" required>
                    </div>
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group half">
                            <label>시작 시간</label>
                            <input type="time" id="event-start-time">
                        </div>
                        <div class="form-group half">
                            <label>종료 시간</label>
                            <input type="time" id="event-end-time">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>컬러</label>
                        <div class="color-picker" id="color-picker">
                            <span class="color-option selected" data-color="#4A90D9" style="background:#4A90D9"></span>
                            <span class="color-option" data-color="#E74C3C" style="background:#E74C3C"></span>
                            <span class="color-option" data-color="#2ECC71" style="background:#2ECC71"></span>
                            <span class="color-option" data-color="#F39C12" style="background:#F39C12"></span>
                            <span class="color-option" data-color="#9B59B6" style="background:#9B59B6"></span>
                            <span class="color-option" data-color="#1ABC9C" style="background:#1ABC9C"></span>
                            <span class="color-option" data-color="#E91E63" style="background:#E91E63"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>메모</label>
                        <textarea id="event-memo" placeholder="메모를 입력하세요" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>사진 첨부</label>
                        <div class="photo-upload">
                            <input type="file" id="event-photo" accept="image/*" multiple>
                            <div id="event-photo-preview" class="photo-preview"></div>
                        </div>
                    </div>
                    <input type="hidden" id="event-id">
                    <div class="form-actions">
                        <button type="button" id="delete-event-btn" class="btn-delete hidden">삭제</button>
                        <button type="submit" class="btn-save">저장</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 메모 추가/수정 모달 -->
        <div id="memo-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="memo-modal-title">메모 추가</h3>
                    <button class="close-btn" id="close-memo-modal">&times;</button>
                </div>
                <form id="memo-form">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="memo-title" placeholder="메모 제목" required>
                    </div>
                    <div class="form-group">
                        <label>내용</label>
                        <textarea id="memo-content" placeholder="내용을 입력하세요" rows="6"></textarea>
                    </div>
                    <div class="form-group">
                        <label>사진 첨부</label>
                        <div class="photo-upload">
                            <input type="file" id="memo-photo" accept="image/*" multiple>
                            <div id="memo-photo-preview" class="photo-preview"></div>
                        </div>
                    </div>
                    <input type="hidden" id="memo-id">
                    <div class="form-actions">
                        <button type="button" id="delete-memo-btn" class="btn-delete hidden">삭제</button>
                        <button type="submit" class="btn-save">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
